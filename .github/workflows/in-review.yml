name: Move issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          script: |
            // 1️⃣ Obtener Projects y fields
            const projectsData = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      name
                      fields(first: 20) {
                        nodes {
                          __typename
                          ... on ProjectV2FieldCommon { id name }
                          ... on ProjectV2SingleSelectField { id name }
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            const project = projectsData.repository.projectsV2.nodes[0];
            if (!project) {
              console.log("No Projects found in repo");
              return;
            }

            const statusField = project.fields.nodes.find(
              f => f.__typename === "ProjectV2SingleSelectField" && f.name.toLowerCase() === "status"
            );
            if (!statusField) {
              console.log("No Status field found in Project");
              return;
            }

            // 2️⃣ Obtener options del campo Status
            const fieldOptionsData = await github.graphql(`
              query($fieldId: ID!) {
                node(id: $fieldId) {
                  ... on ProjectV2SingleSelectField {
                    options { id name }
                  }
                }
              }
            `, { fieldId: statusField.id });

            const inReviewOption = fieldOptionsData.node.options.find(
              o => o.name.toLowerCase() === "in review"
            );
            if (!inReviewOption) {
              console.log("No 'In Review' option found in Status field");
              return;
            }

            console.log("ProjectId:", project.id);
            console.log("StatusFieldId:", statusField.id);
            console.log("InReviewOptionId:", inReviewOption.id);

            // 3️⃣ Obtener issues vinculados al PR
            const prNodeId = context.payload.pull_request.node_id;
            const prData = await github.graphql(`
              query {
                node(id: "${prNodeId}") {
                  ... on PullRequest {
                    closingIssuesReferences(first: 10) {
                      nodes { id }
                    }
                  }
                }
              }
            `);

            for (const issue of prData.node.closingIssuesReferences.nodes) {
              // Obtener item del issue en el Project
              const itemData = await github.graphql(`
                query {
                  node(id: "${issue.id}") {
                    ... on Issue {
                      projectItems(first:10) {
                        nodes { id }
                      }
                    }
                  }
                }
              `);

              let itemId = itemData.node.projectItems.nodes[0]?.id;

              if (!itemId) {
                console.log(`Issue ${issue.id} no tiene item en el Project, se ignorará.`);
                continue;
              }

              console.log(`Updating Issue ${issue.id}, ItemId: ${itemId}`);

              // 4️⃣ Actualizar Status a In Review
              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}",
                    itemId: "${itemId}",
                    fieldId: "${statusField.id}",
                    value: { singleSelectOptionId: "${inReviewOption.id}" }
                  }) {
                    projectV2Item { id }
                  }
                }
              `);
              console.log(`Issue ${issue.id} movido a 'In Review'`);
            }
