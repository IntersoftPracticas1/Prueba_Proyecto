name: Move issues to In Review

on:
  pull_request:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        uses: actions/github-script@v7
        with:
          script: |
            // 1️⃣ Obtener Project y fields
            const projectsData = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      fields(first: 20) {
                        nodes {
                          id
                          name
                          __typename
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            const project = projectsData.repository.projectsV2.nodes[0];
            if (!project) return;

            const statusField = project.fields.nodes.find(f => f.__typename === "ProjectV2SingleSelectField" && f.name.toLowerCase() === "status");
            if (!statusField) return;

            // 2️⃣ Obtener options de Status (segunda query)
            const fieldOptionsData = await github.graphql(`
              query($fieldId: ID!) {
                node(id: $fieldId) {
                  ... on ProjectV2SingleSelectField {
                    options { id name }
                  }
                }
              }
            `, { fieldId: statusField.id });

            const inReviewOption = fieldOptionsData.node.options.find(o => o.name.toLowerCase() === "in review");
            if (!inReviewOption) return;

            // 3️⃣ Mover issues vinculados al PR
            const prNodeId = context.payload.pull_request.node_id;
            const prData = await github.graphql(`
              query { node(id: "${prNodeId}") { ... on PullRequest { closingIssuesReferences(first: 10) { nodes { id } } } } }
            `);

            for (const issue of prData.node.closingIssuesReferences.nodes) {
              const itemData = await github.graphql(`query { node(id: "${issue.id}") { ... on Issue { projectItems(first:10) { nodes { id } } } } }`);
              const itemId = itemData.node.projectItems.nodes[0]?.id;
              if (!itemId) continue;

              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}",
                    itemId: "${itemId}",
                    fieldId: "${statusField.id}",
                    value: { singleSelectOptionId: "${inReviewOption.id}" }
                  }) { projectV2Item { id } }
                }
              `);
            }
