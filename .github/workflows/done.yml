name: Move issues to Done

on:
  pull_request:
    types: [closed]
  issues:
    types: [closed]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  move:
    runs-on: ubuntu-latest
    steps:
      - name: Move issues to Done
        uses: actions/github-script@v7
        with:
          script: |
            // Obtener Project y fields
            const projectsData = await github.graphql(`
              query($owner: String!, $repo: String!) {
                repository(owner: $owner, name: $repo) {
                  projectsV2(first: 10) {
                    nodes {
                      id
                      fields(first: 20) {
                        nodes {
                          id
                          name
                          __typename
                        }
                      }
                    }
                  }
                }
              }
            `, { owner: context.repo.owner, repo: context.repo.repo });

            const project = projectsData.repository.projectsV2.nodes[0];
            if (!project) return;

            const statusField = project.fields.nodes.find(f => f.__typename === "ProjectV2SingleSelectField" && f.name.toLowerCase() === "status");
            if (!statusField) return;

            // Obtener options de Status
            const fieldOptionsData = await github.graphql(`
              query($fieldId: ID!) {
                node(id: $fieldId) {
                  ... on ProjectV2SingleSelectField {
                    options { id name }
                  }
                }
              }
            `, { fieldId: statusField.id });

            const doneOption = fieldOptionsData.node.options.find(o => o.name.toLowerCase() === "done");
            if (!doneOption) return;

            // Obtener issues a mover
            let issueIds = [];
            if (context.eventName === "pull_request" && context.payload.pull_request.merged) {
              const prData = await github.graphql(`query { node(id: "${context.payload.pull_request.node_id}") { ... on PullRequest { closingIssuesReferences(first:10) { nodes { id } } } } }`);
              issueIds = prData.node.closingIssuesReferences.nodes.map(i => i.id);
            }
            if (context.eventName === "issues") {
              issueIds = [context.payload.issue.node_id];
            }

            // Mover issues a Done
            for (const issueId of issueIds) {
              const itemData = await github.graphql(`query { node(id: "${issueId}") { ... on Issue { projectItems(first:10) { nodes { id } } } } }`);
              const itemId = itemData.node.projectItems.nodes[0]?.id;
              if (!itemId) continue;

              await github.graphql(`
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: "${project.id}",
                    itemId: "${itemId}",
                    fieldId: "${statusField.id}",
                    value: { singleSelectOptionId: "${doneOption.id}" }
                  }) { projectV2Item { id } }
                }
              `);
            }
